<div class="social-buttons" style="display: flex; gap: 20px; align-items: center; text-align: center;">
  <div class="share" style="margin-right: 15px;">
    <p style="margin-bottom: 5px; font-size: 0.8rem;">Share on SNS</p>
    <a href="https://twitter.com/share?url={{ site.url }}{{ site.baseurl }}/&text={{ site.title | url_encode }}" target="_blank" rel="noopener">
      <i class="nes-icon twitter"></i>
    </a>
    <a href="https://www.facebook.com/sharer/sharer.php?u={{ site.url }}{{ site.baseurl }}/" target="_blank" rel="noopener">
      <i class="nes-icon facebook"></i>
    </a>
  </div>
  <div class="github-link">
    <a href="https://github.com/Chocobone" target="_blank" rel="noopener" style="text-decoration: none; color: inherit;">
      <i class="nes-icon github"></i>
      <div style="font-size: 0.8rem;">GitHub</div>
    </a>
  </div>
</div>
